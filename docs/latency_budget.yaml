# Per-group live-path (compute_latest) latency budget — the machine-checked accountability layer.
#
# WHAT: each group's max allowed compute_latest ms at the REFERENCE shard (312 tickers, 245m window,
#   200 daily days, with trades), measured by quantlib.features.profile.profile(latest=True). The
#   pytest gate tests/test_fp_latency_budget.py asserts each runnable group stays UNDER its budget
#   (re-confirming a suspect with more reps so transient host load does not flake the gate).
# WHY: replaces the two loose GLOBAL ceilings (us/feature + a trades ms) — a 3x single-group
#   regression used to pass silently. Now every group has a checked-in expectation.
# SEED: budget = max(2x measured, measured+5ms) — generous enough to absorb host-load jitter, tight
#   enough to catch a real 2x+ regression / an accidental O(buffer) scan. Re-seed (raise/lower) only
#   on a DELIBERATE, reviewed change; a surprise breach is a regression to investigate, not to bump.
# NOTE: this is the single-shard profiling view — for ReductionGroups, compute_latest here runs the
#   per-group rolling form, NOT the shared incremental emit the e2e sim uses (so price_volume etc. read
#   high). The gate uses the SAME harness, so it is self-consistent for REGRESSION detection (the
#   point), even though the absolute ms differs from the in-flow e2e per-group share.

reference_shard:
  n_tickers: 312
  window_min: 245
  daily_days: 200
  include_trades: true

# group: budget_ms   (measured ms at seed time in the trailing comment)
