# 24/7 CRYPTO capture — an ISOLATED validation harness that exercises the SAME production pipeline
# (capture -> feature compute -> bus emit) as the equity feature-computer, but against Alpaca's crypto
# websocket (v1beta3/crypto/us), which trades CONTINUOUSLY. Equity capture only runs 06:30-13:00 PT on
# weekdays; this gives us a LIVE feed any time (nights / weekends / holidays) to validate fc / features /
# latency / bus.
#
# DELIBERATELY ISOLATED from the live equity fc: its OWN container, OWN store volume (fp_store_crypto, NOT
# fp_store_real), and a SEPARATE bus namespace (fv:crypto:<SYMBOL>) — so it can NEVER touch the equity fc,
# its bus fingerprint, its store, or its bus.
#
#   make dev-image                                                              # build/refresh shared fp-dev
#   docker compose -f docker-compose.crypto.yml up -d crypto-capture
#
# Uses the PREBUILT `fp-dev` image (docker/fp-dev.Dockerfile via `make dev-image`) — the SAME Rust-baked
# (quant_tick) image the equity fc/strategies run on. NO `build:` directive here ON PURPOSE: a stray
# `up --build` must NEVER be able to re-tag/overwrite the good fp-dev with a wrong image. Refresh fp-dev
# only via `make dev-image`.
#
# This is a TEST / VALIDATION harness (prove the pipeline runs live 24/7), NOT a crypto trading strategy.
name: quant

services:
  crypto-capture:
    container_name: crypto-capture
    image: fp-dev
    restart: unless-stopped
    mem_limit: 2g
    env_file: .env
    environment:
      PYTHONPATH: "/app"
      BUS_REDIS_URL: "redis://quant-redis:6379/0"
      # Publish per-symbol crypto vectors to the SEPARATE fv:crypto:<SYMBOL> bus namespace.
      FP_BUS: "1"
      # Liquid crypto pairs (Alpaca slash form). Override here or in .env.
      FP_CRYPTO_SYMBOLS: "BTC/USD,ETH/USD,SOL/USD,LTC/USD,DOGE/USD"
      # Prometheus /metrics for the crypto reader (separate port from the equity reader's 9200).
      CRYPTO_METRICS_PORT: "9300"
      # Lever-1 live A/B self-check: compute BOTH batch (written truth) and incremental each minute and
      # compare them, on the live 24/7 stream — the gate that must read 0 breaches before FP_INCREMENTAL=1
      # (parity OFF, the ~10x speedup) is ever promoted to source-of-truth on fc/crypto.
      # SAFE: with FP_INCREMENTAL_PARITY=1 the batch recompute STAYS the truth (capture.process_bars
      # else-branch) — NO output change; incremental is computed only for the cell-for-cell self-check.
      # ⚠️ FP_INCREMENTAL_SLICE=1 is REQUIRED for a clean self-check: PR #174 fixed the sparse/seed
      # null-mismatch (a _matrix_at slice that tailed FUTURE bars for historical minutes) INSIDE the
      # slice-derive path. With SLICE=0 (whole-buffer) the fix isn't exercised and the self-check still
      # breaches (+Inf null/non-null); with SLICE=1 it reads 0 (MondayDryRun equity A/B: 0/6, all groups).
      # SLICE=1 is also the faster path we actually want for the speedup. The parity self-check guard
      # needs FP_INCREMENTAL=1 too (capture.py: `if incremental and parity_check`), but that does NOT make
      # incremental the truth while PARITY is on.
      FP_INCREMENTAL: "1"
      FP_INCREMENTAL_SLICE: "1"
      FP_INCREMENTAL_PARITY: "1"
    ports:
      - "9300:9300"                     # expose the crypto reader /metrics so the parity self-check is readable
    volumes:
      - fp_store_crypto:/store          # OWN store volume — never the equity fp_store_real
      - .:/app                          # bind the working tree (mirrors the equity feature-computer)
    command: ["python", "-m", "quantlib.features.crypto_capture", "/store"]

volumes:
  fp_store_crypto:
