# Feature-platform streaming — env-switchable mock<->real. Separate from the legacy stack.
# Build the shared fp-dev image first, then bring the stack up:
#   make dev-image
#   docker compose -f docker-compose.fp.yml up --build      # --build only (re)builds mock-stream
#
# `capture` runs the PREBUILT `fp-dev` image (docker/fp-dev.Dockerfile via `make dev-image`) — the SAME
# Rust-baked (quant_tick) image the equity fc/strategies run on. NO `build:` directive here ON PURPOSE:
# the feature engine imports quant_tick, so the image MUST be the Rust-baked fp-dev. Refresh it only via
# `make dev-image`.
services:
  mock-stream:
    build: ./mock_stream
    environment:
      MOCK_MINUTES: "${MOCK_MINUTES:-390}"
      MOCK_INTERVAL_SEC: "${MOCK_INTERVAL_SEC:-60}"   # 60 = real-time; 0.02 = fast test
  capture:
    image: fp-dev
    depends_on: [mock-stream]
    volumes: ["fp_store_mock:/store"]
    # flip to the real feed (alpaca adapter) + mode=real + a real store volume for production
    command: ["python", "-m", "quantlib.features.capture", "ws://mock-stream:9001", "SYM0,SYM1,SYM2,SYM3,SYM4", "/store", "mock", "2026-06-16"]
volumes:
  fp_store_mock:
