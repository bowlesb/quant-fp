name: quant

x-common: &common
  restart: unless-stopped
  env_file: .env
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    <<: *common
    environment:
      POSTGRES_DB: quant
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - ./data/pg:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    shm_size: 2gb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant -d quant"]
      interval: 10s
      timeout: 5s
      retries: 5

  ingestor:
    build:
      context: .
      dockerfile: services/ingestor/Dockerfile
    <<: *common
    environment:
      # Bars stream for the whole universe (loaded from DB); trades/quotes only
      # for this liquid subset to keep one process healthy.
      TRADE_QUOTE_SYMBOLS: "AAPL,MSFT,NVDA,AMZN,GOOGL,META,TSLA,SPY,QQQ,JPM"
    depends_on:
      timescaledb:
        condition: service_healthy

  executor:
    build: ./services/executor
    <<: *common
    environment:
      HELLO_SYMBOL: "SPY"
      HELLO_QTY: "1"
    depends_on:
      timescaledb:
        condition: service_healthy

  backfill-manager:
    build:
      context: .
      dockerfile: services/backfill-manager/Dockerfile
    <<: *common
    environment:
      BACKFILL_TARGET_DAYS: "90"     # raise toward ~2200 (6yr) once proven
    depends_on:
      timescaledb:
        condition: service_healthy

  feature-computer:
    build:
      context: .
      dockerfile: services/feature-computer/Dockerfile
    <<: *common
    environment:
      FEATURE_SYMBOLS: "AAPL,MSFT,NVDA,AMZN,GOOGL,META,TSLA,SPY,QQQ,JPM"
    depends_on:
      timescaledb:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: services/scheduler/Dockerfile
    <<: *common
    environment:
      SYMBOLS: "AAPL,MSFT,NVDA,AMZN,GOOGL,META,TSLA,SPY,QQQ,JPM"
    depends_on:
      timescaledb:
        condition: service_healthy

  backfiller:
    build:
      context: .
      dockerfile: services/backfiller/Dockerfile
    env_file: .env
    profiles: ["tools"]          # run on demand: docker compose run --rm backfiller <cmd>
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      timescaledb:
        condition: service_healthy

  dashboard:
    build: ./services/dashboard
    <<: *common
    ports:
      - "0.0.0.0:8088:8000"     # LAN-accessible: http://192.168.1.32:8088
    volumes:
      - ./STATE.md:/docs/STATE.md:ro
      - ./JOURNAL.md:/docs/JOURNAL.md:ro
      - ./ARCHITECTURE.md:/docs/ARCHITECTURE.md:ro
    depends_on:
      timescaledb:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    <<: *common
    ports:
      - "127.0.0.1:9091:9090"
    volumes:
      - ./config/prometheus:/etc/prometheus:ro
      - prom_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    <<: *common
    ports:
      - "0.0.0.0:3001:3000"     # LAN-accessible: http://192.168.1.32:3001
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_AUTH_BASIC_ENABLED: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prom_data:
  grafana_data:
