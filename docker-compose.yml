name: quant

x-common: &common
  restart: unless-stopped
  env_file: .env
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    <<: *common
    environment:
      POSTGRES_DB: quant
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - ./data/pg:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    shm_size: 2gb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant -d quant"]
      interval: 10s
      timeout: 5s
      retries: 5

  ingestor:
    build:
      context: .
      dockerfile: services/ingestor/Dockerfile
    <<: *common
    environment:
      # M2 topology A: one reader owns the single websocket; trades/quotes for the
      # top-ADV OFI names (derived dynamically from universe_membership) are sharded
      # across INGESTOR_SHARDS aggregation-worker processes. Bars stream for the
      # whole equities universe (+ market-context ETFs). No static symbol list — the
      # OFI set self-maintains as the universe churns.
      INGESTOR_SHARDS: "4"
      OFI_SYMBOL_COUNT: "512"
      MARKET_CONTEXT_SYMBOLS: "QQQ,SPY,IWM"
      # Per-worker Prometheus coverage metrics on BASE_PORT + shard_id (9101..9104).
      WORKER_METRICS_BASE_PORT: "9101"
      COVERAGE_SILENCE_ALARM_MIN: "10"
    expose:
      - "9101"
      - "9102"
      - "9103"
      - "9104"
    depends_on:
      timescaledb:
        condition: service_healthy

  executor:
    build:
      context: .
      dockerfile: services/executor/Dockerfile
    <<: *common
    environment:
      DRY_RUN: "false"               # LIVE tiny paper bets (Exec/Risk GO-WITH-FIXES applied)
      MODEL_VERSION: "lgbm_fwd_30m_v1.0.0"
      K_LONG: "3"
      K_SHORT: "3"
      NOTIONAL_PER_NAME: "200"
      GROSS_CAP: "6000"               # tiny vs ~$100k paper equity; covers whole-share lumpiness
      MAX_DAILY_LOSS: "150"
      EOD_FLATTEN_MIN: "12"
    depends_on:
      timescaledb:
        condition: service_healthy

  backfill-manager:
    build:
      context: .
      dockerfile: services/backfill-manager/Dockerfile
    <<: *common
    environment:
      BACKFILL_TARGET_DAYS: "900"     # ~2.5yr; deep history for cross-sectional ML (raise toward 6yr)
    depends_on:
      timescaledb:
        condition: service_healthy

  experimenter:
    build:
      context: .
      dockerfile: services/experimenter/Dockerfile
    <<: *common
    environment:
      FEATURE_SET_VERSION: "v1.0.0"
      FEATURE_CADENCE_MIN: "30"
      EXP_HEAVY_AFTER_PT: "00:00"
    volumes:
      - ./experiments:/app/experiments
      - ./docs:/app/docs
    depends_on:
      timescaledb:
        condition: service_healthy

  model-server:
    build:
      context: .
      dockerfile: services/model-server/Dockerfile
    <<: *common
    environment:
      MODEL_HORIZON: "fwd_30m"
      FEATURE_CADENCE_MIN: "30"
    volumes:
      - ./models:/models:ro
    depends_on:
      timescaledb:
        condition: service_healthy

  feature-computer:
    build:
      context: .
      dockerfile: services/feature-computer/Dockerfile
    <<: *common
    environment:
      FEATURE_SYMBOLS: "AAPL,MSFT,NVDA,AMZN,GOOGL,META,TSLA,SPY,QQQ,JPM"
    depends_on:
      timescaledb:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: services/scheduler/Dockerfile
    <<: *common
    environment:
      SYMBOLS: "AAPL,MSFT,NVDA,AMZN,GOOGL,META,TSLA,SPY,QQQ,JPM"
    depends_on:
      timescaledb:
        condition: service_healthy

  trainer:
    build:
      context: .
      dockerfile: services/trainer/Dockerfile
    env_file: .env
    profiles: ["tools"]          # run on demand: docker compose run --rm trainer [horizon]
    environment:
      FEATURE_CADENCE_MIN: "30"
    volumes:
      - ./models:/models
    depends_on:
      timescaledb:
        condition: service_healthy

  backfiller:
    build:
      context: .
      dockerfile: services/backfiller/Dockerfile
    env_file: .env
    profiles: ["tools"]          # run on demand: docker compose run --rm backfiller <cmd>
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      timescaledb:
        condition: service_healthy

  dashboard:
    build: ./services/dashboard
    <<: *common
    ports:
      - "0.0.0.0:8088:8000"     # LAN-accessible: http://192.168.1.32:8088
    volumes:
      - ./STATE.md:/docs/STATE.md:ro
      - ./JOURNAL.md:/docs/JOURNAL.md:ro
      - ./ARCHITECTURE.md:/docs/ARCHITECTURE.md:ro
      # 8-hour progress reports rendered by the /progress page. Dir mount (not a
      # rebuild) so a new report .md is served immediately — content, not code.
      - ./docs/progress:/docs/progress:ro
    depends_on:
      timescaledb:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    <<: *common
    ports:
      - "127.0.0.1:9091:9090"
    volumes:
      - ./config/prometheus:/etc/prometheus:ro
      - prom_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    <<: *common
    ports:
      - "0.0.0.0:3001:3000"     # LAN-accessible: http://192.168.1.32:3001
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_AUTH_BASIC_ENABLED: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prom_data:
  grafana_data:
