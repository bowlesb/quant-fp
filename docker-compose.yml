name: quant

x-common: &common
  restart: unless-stopped
  env_file: .env
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    <<: *common
    environment:
      POSTGRES_DB: quant
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - ./data/pg:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    shm_size: 2gb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant -d quant"]
      interval: 10s
      timeout: 5s
      retries: 5

  ingestor:
    build:
      context: .
      dockerfile: services/ingestor/Dockerfile
    <<: *common
    environment:
      # M2 topology A: one reader owns the single websocket; trades/quotes for the
      # top-ADV OFI names (derived dynamically from universe_membership) are sharded
      # across INGESTOR_SHARDS aggregation-worker processes. Bars stream for the
      # whole equities universe (+ market-context ETFs). No static symbol list — the
      # OFI set self-maintains as the universe churns.
      INGESTOR_SHARDS: "4"
      OFI_SYMBOL_COUNT: "512"
      MARKET_CONTEXT_SYMBOLS: "QQQ,SPY,IWM"
      # Per-worker Prometheus coverage metrics on BASE_PORT + shard_id (9101..9104).
      WORKER_METRICS_BASE_PORT: "9101"
      COVERAGE_SILENCE_ALARM_MIN: "10"
    expose:
      - "9101"
      - "9102"
      - "9103"
      - "9104"
    depends_on:
      timescaledb:
        condition: service_healthy

  executor:
    build:
      context: .
      dockerfile: services/executor/Dockerfile
    <<: *common
    environment:
      DRY_RUN: "false"               # LIVE tiny paper bets (Exec/Risk GO-WITH-FIXES applied)
      MODEL_VERSION: "lgbm_fwd_30m_v1.0.0"
      K_LONG: "3"
      K_SHORT: "3"
      NOTIONAL_PER_NAME: "200"
      GROSS_CAP: "6000"               # tiny vs ~$100k paper equity; covers whole-share lumpiness
      MAX_DAILY_LOSS: "150"
      EOD_FLATTEN_MIN: "12"
    depends_on:
      timescaledb:
        condition: service_healthy

  backfill-manager:
    build:
      context: .
      dockerfile: services/backfill-manager/Dockerfile
    <<: *common
    environment:
      BACKFILL_TARGET_DAYS: "900"     # ~2.5yr; deep history for cross-sectional ML (raise toward 6yr)
    depends_on:
      timescaledb:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: services/scheduler/Dockerfile
    <<: *common
    environment:
      SYMBOLS: "AAPL,MSFT,NVDA,AMZN,GOOGL,META,TSLA,SPY,QQQ,JPM"
    depends_on:
      timescaledb:
        condition: service_healthy

  edgar:
    # Phase 1 EDGAR alt-data: poll the SEC current-filings Atom feed (~5s), dedupe by accession,
    # map CIK->ticker, and UPSERT into `filings` capturing available_at = the dissemination instant
    # (the look-ahead-safe point-in-time field — see docs/EDGAR_INGESTION.md). COLLECTION ONLY.
    build:
      context: .
      dockerfile: services/edgar/Dockerfile
    <<: *common
    environment:
      EDGAR_MODE: "stream"
      EDGAR_POLL_SECONDS: "5"
      EDGAR_SEC_MAX_RPS: "4.0"
      # SEC blocks requests without a real User-Agent; override in .env with a contact address.
      SEC_USER_AGENT: "${SEC_USER_AGENT:-quant-fp research ben.bowles@gmail.com}"
      # Empty/"*" collects ALL form types (breadth-first); set a comma list to restrict.
      EDGAR_FORMS: "*"
    depends_on:
      timescaledb:
        condition: service_healthy

  trainer:
    build:
      context: .
      dockerfile: services/trainer/Dockerfile
    env_file: .env
    profiles: ["tools"]          # run on demand: docker compose run --rm trainer [horizon]
    environment:
      FEATURE_CADENCE_MIN: "30"
    volumes:
      - ./models:/models
    depends_on:
      timescaledb:
        condition: service_healthy

  dashboard:
    build:
      # Repo-root context so the image can COPY the shared quantlib package + rust/ source
      # (the feature-coverage grid imports the live feature registry / store introspection).
      context: .
      dockerfile: services/dashboard/Dockerfile
    <<: *common
    # Run as the HOST user (ben) so files the container writes into the ~/.quant-ops RW bind-mount below
    # (status_dashboard.json + its .lock, via the /status reaction POST) stay owned by the host user. The
    # hourly status board has TWO writers — this container AND the host Lead loop (status_grid.write_status_cells).
    # As root the container would rewrite the shared file root:root 0600, locking out the host writer
    # (PermissionDenied on the Lead's next cycle). Matching uids makes both writers coexist. The dashboard
    # serves on 8000 (unprivileged) and only reads its image files, so non-root is safe. HOST_UID/HOST_GID
    # come from .env (default 1000:1000 = the box's primary user).
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    environment:
      STORE_ROOT: /store
      # The cache Mongo the store-grid-worker writes; the dashboard READS the precomputed grid from here.
      STORE_GRID_MONGO_URL: "mongodb://quant-mongo:27017"
      # The hourly status dashboard's append-only JSON store (matches the Dockerfile default). Shared with the
      # HOST Lead loop via the ~/.quant-ops bind-mount below — the Lead writes rows, the container serves the
      # read route + appends Ben's reactions.
      STATUS_STORE_PATH: /quant-ops/status_dashboard.json
    ports:
      - "0.0.0.0:8088:8000"     # LAN-accessible: http://192.168.1.32:8088
    volumes:
      # Feature store (read-only): feature_grid introspection reads partition dates + per-date symbol counts.
      # RO so the dashboard can never write. The GRID itself is served from Mongo (the worker's precompute),
      # not built here.
      - fp_store_real:/store:ro
      # ~/.quant-ops (read-WRITE): the hourly status dashboard's append-only JSON store lives here, shared with
      # the host Lead loop. The container serves the read route + appends Ben's reactions; the Lead writes rows.
      # This is the ONLY writable mount and it is an ops directory, NOT the feature store — no fingerprint risk.
      - ${HOME}/.quant-ops:/quant-ops
    depends_on:
      timescaledb:
        condition: service_healthy
      mongo:
        condition: service_healthy

  mongo:
    # Dedicated cache store for the always-warm coverage grid (NOT the feature pipeline's store). The
    # store-grid-worker WRITES the precomputed 18-month matrix (+ drills + meta) here; the dashboard READS it,
    # so a page load is one indexed document fetch and the heavy build is never on the request path. A small
    # named volume persists the cache across restarts. LAN-internal only (no published port).
    image: mongo:7
    container_name: quant-mongo
    <<: *common
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  store-grid-worker:
    # The ALWAYS-WARM background worker for the ticker×date feature-store coverage matrix (the dashboard grid).
    # Reuses the dashboard IMAGE (same quantlib/polars + the read-only /store mount + the DB for the trust read)
    # but runs a permanent rebuild LOOP instead of the web server: build on boot, write the compact gzipped
    # matrix + drills + meta to MongoDB, then rebuild every 10 MINUTES forever. The dashboard always serves the
    # last-good document, so a cold/expired cache can never surface a recurring "warming" state — the only
    # loading state is the genuine first-ever boot. Read-only w.r.t. the feature store; no fingerprint/schema risk.
    build:
      context: .
      dockerfile: services/dashboard/Dockerfile
    container_name: store-grid-worker
    <<: *common
    command: ["python3", "-m", "store_grid_cache"]
    environment:
      STORE_ROOT: /store
      # The dedicated cache Mongo (quant-mongo on quant_default). The matrix + per-ticker drills + meta live here.
      STORE_GRID_MONGO_URL: "mongodb://quant-mongo:27017"
      # 10-minute refresh cadence (Ben's spec): build, write to Mongo, wait 600s, repeat.
      STORE_GRID_INTERVAL_SECONDS: "600"
    volumes:
      # Feature store, READ-ONLY: the worker reads partition dates + per-date symbol sets to build the
      # coverage matrix. RO so it can never write the store the feature pipeline owns.
      - fp_store_real:/store:ro
    depends_on:
      timescaledb:
        condition: service_healthy
      mongo:
        condition: service_healthy

  underrep-worker:
    # Background worker for the FLEET under-represented-ticker view (symbols settled in backfill but absent from
    # the live stream — the FP_TICK_SYMBOLS gap, ranked universe-wide). Reuses the dashboard IMAGE but runs the
    # under-rep loop instead of the web server. UNLIKE store-grid-worker this is a SLOW, DAILY cadence: the gap
    # moves only as the stream tier / backfill coverage changes (days, not minutes), and a frequent full-universe
    # walk would contend with the live pipeline. The walk is bounded (a few recent backfill dates + the recent
    # stream window, sampled files) and the dashboard always serves the last-good document. Read-only w.r.t. the
    # feature store; no trust/DB needed for this report; no fingerprint/schema risk.
    build:
      context: .
      dockerfile: services/dashboard/Dockerfile
    container_name: underrep-worker
    <<: *common
    command: ["python3", "-m", "underrep_cache"]
    environment:
      STORE_ROOT: /store
      UNDERREP_MONGO_URL: "mongodb://quant-mongo:27017"
      # DAILY refresh — slow by design (box load + a full-universe walk). Build, write to Mongo, wait 24h.
      UNDERREP_INTERVAL_SECONDS: "86400"
      # Off-peak guard: with NO explicit UNDERREP_STARTUP_DELAY_SECONDS, the worker computes the wait until the
      # next UNDERREP_OFFPEAK_HOUR_UTC so the FIRST full-universe walk lands AFTER the US close (20:00Z / 16:00
      # ET), never during the live session — regardless of when the container (re)starts. Daily cadence proceeds
      # from there. Set UNDERREP_STARTUP_DELAY_SECONDS: "0" to override and build immediately (e.g. a manual
      # off-hours deploy).
      UNDERREP_OFFPEAK_HOUR_UTC: "20"
    volumes:
      # Feature store, READ-ONLY: the worker reads partition dates + per-date symbol sets. RO so it can never
      # write the store the feature pipeline owns.
      - fp_store_real:/store:ro
    depends_on:
      mongo:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    <<: *common
    ports:
      - "127.0.0.1:9091:9090"
    volumes:
      - ./config/prometheus:/etc/prometheus:ro
      - prom_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    <<: *common
    ports:
      - "0.0.0.0:3001:3000"     # LAN-accessible: http://192.168.1.32:3001
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_AUTH_BASIC_ENABLED: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  # The real feature store, created by the capture/backfill runs. External so the dashboard mounts the
  # SAME volume the feature pipeline writes (read-only) without owning its lifecycle.
  fp_store_real:
    external: true
  prom_data:
  grafana_data:
  # Persists the dashboard coverage-grid cache (the store-grid-worker's precomputed matrix + drills + meta)
  # across restarts. Local (NOT external) — this cache is owned by this compose project, rebuilt every 10 min.
  mongo_data:
