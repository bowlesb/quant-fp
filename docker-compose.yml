name: quant

x-common: &common
  restart: unless-stopped
  env_file: .env
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    <<: *common
    environment:
      POSTGRES_DB: quant
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - ./data/pg:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    shm_size: 2gb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant -d quant"]
      interval: 10s
      timeout: 5s
      retries: 5

  ingestor:
    build: ./services/ingestor
    <<: *common
    environment:
      SYMBOLS: "AAPL,MSFT,NVDA,AMZN,GOOGL,META,TSLA,SPY,QQQ,JPM"
    depends_on:
      timescaledb:
        condition: service_healthy

  executor:
    build: ./services/executor
    <<: *common
    environment:
      HELLO_SYMBOL: "SPY"
      HELLO_QTY: "1"
    depends_on:
      timescaledb:
        condition: service_healthy

  scheduler:
    build: ./services/scheduler
    <<: *common
    environment:
      SYMBOLS: "AAPL,MSFT,NVDA,AMZN,GOOGL,META,TSLA,SPY,QQQ,JPM"
    depends_on:
      timescaledb:
        condition: service_healthy

  dashboard:
    build: ./services/dashboard
    <<: *common
    ports:
      - "0.0.0.0:8088:8000"     # LAN-accessible: http://192.168.1.32:8088
    volumes:
      - ./STATE.md:/docs/STATE.md:ro
      - ./JOURNAL.md:/docs/JOURNAL.md:ro
      - ./ARCHITECTURE.md:/docs/ARCHITECTURE.md:ro
    depends_on:
      timescaledb:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    <<: *common
    ports:
      - "127.0.0.1:9091:9090"
    volumes:
      - ./config/prometheus:/etc/prometheus:ro
      - prom_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    <<: *common
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prom_data:
  grafana_data:
